services:
  - type: web
    name: tutorio
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.12"
      - key: DATABASE_URL
        fromDatabase:
          name: tutorio-db
          property: connectionString
      - key: AUTO_SEED_ON_STARTUP
        value: "true"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: tutorio-db
    plan: free
